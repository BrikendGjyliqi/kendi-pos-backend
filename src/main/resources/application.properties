spring.application.name=pos
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/kendi_pos
spring.datasource.username=postgres
spring.datasource.password=kendi123

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Spring Security default auth (do ta konfigurojme vete)
spring.security.user.name=disabled
spring.security.user.password=disabled

# Anthropic API
anthropic.api.model=claude-sonnet-4-5-20250929
anthropic.api.max-tokens=4096

# Load local secrets ? s'osht ne git
spring.config.import=optional:application-local.properties